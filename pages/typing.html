<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hyrum's Website</title>
    <link rel="stylesheet" href="../styles/default.css">
    <link rel="stylesheet" href="../styles/script.css">
    <script src="../js/typing.js"></script>
</head>
<body>
    <header>
        <div id="top_bar">
            <a href="../index.html"> To Main Page </a> 
        </div>
        <div id="title_bar">
            <h1>Welcome to Hyrum's Website</h1>
            <p>This is a sample website created for educational purposes.</p>
        </div>
    </header>
    <main>
        <form>
            <label for="name">Name:</label>
            <input type="text" id="name" name="name">
        </form>

        <form>
            <label for="message">Message:</label>
            <textarea id="message" name="message" rows="4" cols="50"></textarea>
        </form>

        <form>
            <label for="myTextbox">Enter Text:</label>
            <input type="text" id="myTextbox" name="myTextbox" placeholder="Type something here...">
        </form>
        
        <button type="button" onclick="changeText('it worked')">Change Text</button>
        
        
        
    </main>
    

    <footer>
        <div id="bottom_bar">
            <a href="https://facebook.com" target="_blank" rel="noopener">
                <img src="../assets/facebook.png" alt="fb icon">
            </a>
            <a href="https://github.com" target="_blank" rel="noopener">
                <img src="../assets/github.png" alt="github icon">
            </a>
            <a href="https://www.linkedin.com" target="_blank" rel="noopener">
                <img src="../assets/linkedin.jpg" alt="linkedin icon">
            </a>
        </div>
    </footer>

</body>
</html>
