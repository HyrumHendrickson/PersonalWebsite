<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hyrum's Website</title>
    <link rel="stylesheet" href="../styles/default.css">
    <link rel="stylesheet" href="../styles/typing.css">
    <script src="../js/typing.js"></script>
    <div id = 'data' hidden></div>
    <div id = 'empty' hidden></div>
</head>
<body>
    <header>
        <div id="top_bar">
            <a href="../index.html"> To Main Page </a> 
        </div>
        <div id="title_bar">
            <h1>Welcome to Hyrum's Website</h1>
            <p>This is a sample website created for educational purposes.</p>
        </div>
    </header>
    <main>

        <form>
            <label for="name">Input:</label>
            <input type="text" id="name" name="name" value="cool text">
        </form>

        <button type="button" onclick="changeText('name', 'input', 'data', 'div')">Save Input</button>
        <button type="button" onclick="addText('data', 'div', 'output', 'div', end = '<br>')">Send Input</button>
        <button type="button" onclick="changeText('empty', 'div', 'output', 'div')">Clear</button>

        <div id = "output"></div>
        

        
        
        
    </main>
    

    <footer>
        <div id="bottom_bar">
            <a href="https://facebook.com" target="_blank" rel="noopener">
                <img src="../assets/facebook.png" alt="fb icon">
            </a>
            <a href="https://github.com" target="_blank" rel="noopener">
                <img src="../assets/github.png" alt="github icon">
            </a>
            <a href="https://www.linkedin.com" target="_blank" rel="noopener">
                <img src="../assets/linkedin.jpg" alt="linkedin icon">
            </a>
        </div>
    </footer>

</body>
</html>
